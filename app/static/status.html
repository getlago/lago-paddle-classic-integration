<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lago × Paddle — Status</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      padding: 2rem;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    .header-title { font-size: 1.25rem; font-weight: 600; color: #1a1a1a; }
    .header-sep   { color: #999; }
    .header-logo  { height: 24px; width: auto; display: block; }
    .header-badge {
      margin-left: auto;
      font-size: 0.75rem;
      color: #6b7280;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 0.25rem 0.75rem;
    }
    .setup-link {
      font-size: 0.8125rem;
      color: #6366f1;
      text-decoration: none;
      margin-left: 1rem;
    }
    .setup-link:hover { text-decoration: underline; }

    /* ── Status cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .card-icon {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.25rem;
      flex-shrink: 0;
      overflow: hidden;
    }
    .card-icon img { width: 26px; height: 26px; object-fit: contain; }
    .card-icon.green  { background: #f0fdf4; }
    .card-icon.red    { background: #fef2f2; }
    .card-icon.gray   { background: #f3f4f6; }
    .card-icon.yellow { background: #fefce8; }

    .card-body { min-width: 0; }
    .card-label { font-size: 0.75rem; color: #9ca3af; font-weight: 500; text-transform: uppercase; letter-spacing: 0.05em; }
    .card-value { font-size: 0.9375rem; font-weight: 600; color: #111827; margin-top: 0.125rem; }
    .card-value.ok  { color: #15803d; }
    .card-value.err { color: #dc2626; font-size: 0.8125rem; font-weight: 400; }

    /* ── Log panel ── */
    .log-panel {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
      overflow: hidden;
    }

    .log-toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.875rem 1.25rem;
      border-bottom: 1px solid #f3f4f6;
    }

    .log-toolbar-title {
      font-size: 0.875rem;
      font-weight: 600;
      color: #374151;
    }

    .log-search {
      flex: 1;
      max-width: 280px;
      padding: 0.375rem 0.75rem;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 0.8125rem;
      outline: none;
      color: #111827;
    }
    .log-search:focus { border-color: #6366f1; }

    .level-filter {
      display: flex;
      gap: 0.375rem;
    }
    .level-btn {
      padding: 0.25rem 0.625rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 500;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.12s;
    }
    .level-btn.active-info    { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
    .level-btn.active-warning { background: #fefce8; color: #a16207; border-color: #fde68a; }
    .level-btn.active-error   { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
    .level-btn.inactive       { background: #f9fafb; color: #9ca3af; border-color: #e5e7eb; }

    .pause-btn {
      margin-left: auto;
      padding: 0.25rem 0.75rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 500;
      border: 1px solid #e5e7eb;
      background: white;
      color: #6b7280;
      cursor: pointer;
    }
    .pause-btn.paused { background: #fef3c7; color: #92400e; border-color: #fde68a; }

    .log-body {
      height: 480px;
      overflow-y: auto;
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 0.75rem;
      line-height: 1.6;
    }

    .log-entry {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      padding: 0.3rem 1.25rem;
      border-bottom: 1px solid #f9fafb;
      transition: background 0.1s;
    }
    .log-entry:hover { background: #f9fafb; }

    .log-ts    { color: #9ca3af; white-space: nowrap; flex-shrink: 0; }
    .log-level { width: 56px; flex-shrink: 0; font-weight: 600; text-align: center; padding: 0.1rem 0.25rem; border-radius: 4px; font-size: 0.6875rem; }
    .log-level.info    { background: #eff6ff; color: #1d4ed8; }
    .log-level.warning { background: #fefce8; color: #a16207; }
    .log-level.error   { background: #fef2f2; color: #b91c1c; }
    .log-level.critical{ background: #fdf2f8; color: #86198f; }
    .log-level.debug   { background: #f3f4f6; color: #6b7280; }

    .log-event { color: #111827; font-weight: 500; flex-shrink: 0; }
    .log-extra { color: #6b7280; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    .log-empty {
      padding: 3rem;
      text-align: center;
      color: #9ca3af;
      font-family: -apple-system, sans-serif;
      font-size: 0.875rem;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot.green  { background: #22c55e; }
    .dot.red    { background: #ef4444; }
    .dot.gray   { background: #d1d5db; }
    .dot.pulse  { animation: pulse 2s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <img class="header-logo" src="https://getlago.com/logo.svg" alt="Lago" />
    <span class="header-sep">×</span>
    <img class="header-logo" src="https://classic.paddle.com/_astro/pc-logo-light.CzgGlNZs.svg" alt="Paddle Classic" style="height:20px;" />
    <a href="/" class="setup-link">← Setup</a>
    <span class="header-badge" id="lastRefresh">Connecting…</span>
  </div>

  <!-- Status cards -->
  <div class="cards">
    <div class="card" id="card-middleware">
      <div class="card-icon gray" id="icon-middleware">⚙️</div>
      <div class="card-body">
        <div class="card-label">Middleware</div>
        <div class="card-value" id="val-middleware">Loading…</div>
      </div>
    </div>

    <div class="card" id="card-lago">
      <div class="card-icon gray" id="icon-lago">
        <img src="https://getlago.com/logo.svg" alt="Lago" />
      </div>
      <div class="card-body">
        <div class="card-label">Lago</div>
        <div class="card-value" id="val-lago">Loading…</div>
      </div>
    </div>

    <div class="card" id="card-paddle">
      <div class="card-icon gray" id="icon-paddle">
        <img src="https://classic.paddle.com/_astro/pc-logo-light.CzgGlNZs.svg" alt="Paddle Classic" style="width:32px;height:auto;" />
      </div>
      <div class="card-body">
        <div class="card-label">Paddle Classic</div>
        <div class="card-value" id="val-paddle">Loading…</div>
      </div>
    </div>
  </div>

  <!-- Log panel -->
  <div class="log-panel">
    <div class="log-toolbar">
      <span class="log-toolbar-title">Live Logs</span>
      <input class="log-search" id="logSearch" type="text" placeholder="Filter…" />
      <div class="level-filter">
        <button class="level-btn active-info"    data-level="info"    onclick="toggleLevel('info')">info</button>
        <button class="level-btn active-warning" data-level="warning" onclick="toggleLevel('warning')">warn</button>
        <button class="level-btn active-error"   data-level="error"   onclick="toggleLevel('error')">error</button>
      </div>
      <button class="pause-btn" id="pauseBtn" onclick="togglePause()">⏸ Pause</button>
    </div>
    <div class="log-body" id="logBody">
      <div class="log-empty">Waiting for logs…</div>
    </div>
  </div>

  <script>
    // ── State ──
    let allLogs   = [];
    let paused    = false;
    let activeL   = new Set(['info', 'warning', 'error', 'critical', 'debug']);
    let searchQ   = '';

    // ── Status polling (every 10s) ──
    async function fetchStatus() {
      try {
        const res  = await fetch('/api/status');
        const data = await res.json();
        renderStatus(data);
        document.getElementById('lastRefresh').textContent =
          'Updated ' + new Date().toLocaleTimeString();
      } catch (e) {
        setCard('middleware', false, 'Unreachable');
      }
    }

    function setCard(name, ok, label, errMsg) {
      const icon = document.getElementById('icon-' + name);
      const val  = document.getElementById('val-'  + name);
      if (ok) {
        icon.className = 'card-icon green';
        val.className  = 'card-value ok';
        val.textContent = label || 'Connected';
      } else {
        icon.className = 'card-icon red';
        val.className  = 'card-value err';
        val.textContent = errMsg || label || 'Error';
      }
    }

    function renderStatus(data) {
      // Middleware = configured
      if (data.configured) {
        setCard('middleware', true, 'Configured');
      } else {
        setCard('middleware', false, 'Not configured');
      }
      // Lago
      setCard('lago',   data.lago.ok,   'Connected', data.lago.error);
      // Paddle
      setCard('paddle', data.paddle.ok, 'Connected', data.paddle.error);
    }

    // ── Log polling (every 3s) ──
    async function fetchLogs() {
      if (paused) return;
      try {
        const res  = await fetch('/api/logs?limit=200');
        const data = await res.json();
        allLogs = data.logs || [];
        renderLogs();
      } catch (e) { /* silent */ }
    }

    function renderLogs() {
      const body    = document.getElementById('logBody');
      const filter  = searchQ.toLowerCase();

      const filtered = allLogs.filter(entry => {
        const level = (entry.level || 'info').toLowerCase();
        if (!activeL.has(level)) return false;
        if (filter) {
          const text = JSON.stringify(entry).toLowerCase();
          if (!text.includes(filter)) return false;
        }
        return true;
      });

      if (filtered.length === 0) {
        body.innerHTML = '<div class="log-empty">No matching log entries.</div>';
        return;
      }

      body.innerHTML = filtered.map(entry => {
        const ts    = (entry.timestamp || '').replace('T', ' ').replace('Z', '').slice(0, 22);
        const level = (entry.level || 'info').toLowerCase();
        const event = escHtml(entry.event || '');

        // Extra fields (everything except timestamp/level/event)
        const extra = Object.entries(entry)
          .filter(([k]) => !['timestamp', 'level', 'event'].includes(k))
          .map(([k, v]) => `<span style="color:#a78bfa">${escHtml(k)}</span>=<span>${escHtml(String(v))}</span>`)
          .join(' ');

        return `<div class="log-entry">
          <span class="log-ts">${ts}</span>
          <span class="log-level ${level}">${level}</span>
          <span class="log-event">${event}</span>
          ${extra ? `<span class="log-extra">${extra}</span>` : ''}
        </div>`;
      }).join('');
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // ── Controls ──
    function toggleLevel(level) {
      const btn = document.querySelector(`[data-level="${level}"]`);
      if (activeL.has(level)) {
        activeL.delete(level);
        btn.className = 'level-btn inactive';
      } else {
        activeL.add(level);
        btn.className = `level-btn active-${level}`;
      }
      renderLogs();
    }

    function togglePause() {
      paused = !paused;
      const btn = document.getElementById('pauseBtn');
      btn.textContent = paused ? '▶ Resume' : '⏸ Pause';
      btn.className   = paused ? 'pause-btn paused' : 'pause-btn';
    }

    document.getElementById('logSearch').addEventListener('input', e => {
      searchQ = e.target.value;
      renderLogs();
    });

    // ── Boot ──
    fetchStatus();
    fetchLogs();
    setInterval(fetchStatus, 10_000);
    setInterval(fetchLogs,    3_000);
  </script>
</body>
</html>
